AWSTemplateFormatVersion: "2010-09-09"
Description: "Provisions EC2, IAM Role for Bedrock, and a Protected Static Elastic IP."

Parameters:
  InstanceType:
    Type: String
    Default: t3.micro
  AmiId:
    Type: String
    Default: "ami-09040d770ffe2224f" # Ubuntu 22.04 LTS in us-east-2
  KeyName:
    Type: "AWS::EC2::KeyPair::KeyName"
    Description: Name of an existing EC2 KeyPair

Resources:
  # 1. IAM Role & Instance Profile (No change)
  BedrockAccessRole:
    Type: "AWS::IAM::Role"
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ["ec2.amazonaws.com"]
            Action: ["sts:AssumeRole"]
      Policies:
        - PolicyName: BedrockInvokePolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - "bedrock:InvokeModel"
                  - "bedrock:InvokeModelWithResponseStream"
                Resource: "*"

  BedrockInstanceProfile:
    Type: "AWS::IAM::InstanceProfile"
    Properties:
      Roles:
        - !Ref BedrockAccessRole

  # 2. Security Group (No change)
  AppSecurityGroup:
    Type: "AWS::EC2::SecurityGroup"
    Properties:
      GroupDescription: Allow SSH and Manifold Web Traffic
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          FromPort: 3000
          ToPort: 3001
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          FromPort: 3005
          ToPort: 3005
          CidrIp: 0.0.0.0/0

  # 3. The EC2 Instance
  ManifoldInstance:
    Type: "AWS::EC2::Instance"
    Properties:
      InstanceType: !Ref InstanceType
      IamInstanceProfile: !Ref BedrockInstanceProfile
      ImageId: !Ref AmiId
      KeyName: !Ref KeyName
      SecurityGroupIds:
        - !Ref AppSecurityGroup
      Tags:
        - Key: Name
          Value: Manifold-Production-Host
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          # 1. System Updates and Node.js Installation
          curl -fsSL https://deb.nodesource.com/setup_22.x | bash -
          apt-get update -y
          apt-get install -y nodejs git

          # 2. Global Tool Installation
          # Installs PM2 for process management and Pico-Engine globally
          npm install -g pm2 pico-engine

          # 3. Project Setup as 'ubuntu' user
          cd /home/ubuntu
          sudo -u ubuntu git clone https://github.com/Picolab/MCPforEXP.git
          cd MCPforEXP
          sudo -u ubuntu npm install

          # 4. Initialize the Pico-Engine Database
          # This runs your Manifold 'Thing' creation and ruleset registration
          sudo -u ubuntu npm run setup

          # 5. Start the 3-Tier Architecture via PM2
          # Layer 1: The Engine (Port 3000)
          sudo -u ubuntu pm2 start pico-engine --name "engine"

          # Layer 2: The API Proxy (Port 3001)
          sudo -u ubuntu pm2 start src/mcp-client/api-proxy.js --name "proxy"

          # Layer 3: The Vite UI (Port 3005)
          sudo -u ubuntu pm2 start npm --name "ui" -- --prefix src/frontend run dev -- --host

          # 6. Persistence & Startup Configuration
          sudo -u ubuntu pm2 save

          # Saves the process list and ensures it restarts after EC2 reboots
          env PATH=$PATH:/usr/bin /usr/lib/node_modules/pm2/bin/pm2 startup systemd -u ubuntu --hp /home/ubuntu

  # 4. Protected Elastic IP Resource
  ManifoldEIP:
    Type: "AWS::EC2::EIP"
    DeletionPolicy: Retain # <--- Keeps the IP even if the stack is deleted
    Properties:
      Domain: vpc

  # 5. The Association (With Dependency)
  AssociateEIP:
    Type: "AWS::EC2::EIPAssociation"
    DependsOn: ManifoldInstance
    Properties:
      AllocationId: !GetAtt ManifoldEIP.AllocationId
      InstanceId: !Ref ManifoldInstance

Outputs:
  StaticPublicIp:
    Description: The permanent Static IP for your Manifold Assistant
    Value: !Ref ManifoldEIP
